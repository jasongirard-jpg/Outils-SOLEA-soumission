<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SOLEA Calcul">
<meta name="theme-color" content="#b89ef8">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
<title>SOLEA — Calcul temps</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pu:#b89ef8;--pu2:rgba(184,158,248,0.12);--pu3:rgba(184,158,248,0.28);
  --bg:#fff;--bg2:#f5f5f7;--bg3:#e8e8ea;
  --txt:#1a1a1a;--txt2:#555;--txt3:#999;
  --brd:rgba(0,0,0,0.11);--brd2:rgba(0,0,0,0.2);
  --r:10px;--rl:14px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --txt:#f2f2f7;--txt2:#aeaeb2;--txt3:#636366;
  --brd:rgba(255,255,255,0.11);--brd2:rgba(255,255,255,0.22);
}}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif}
.app{display:flex;flex-direction:column;height:100%;padding-top:var(--st)}
.tb{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:9px 14px 8px;background:var(--bg);border-bottom:.5px solid var(--brd)}
.tb-logo{width:36px;height:36px;border-radius:9px;overflow:hidden;flex-shrink:0;background:#c9aff8}
.tb-logo img{width:100%;height:100%;object-fit:cover}
.tb-txt{flex:1}.tb-title{font-size:14px;font-weight:700;color:var(--txt)}
.tb-sub{font-size:10px;color:var(--txt3);margin-top:1px}
.tb-bc{width:26px;height:26px;flex-shrink:0;opacity:.7}
.tb-bc img{width:100%;height:100%;object-fit:contain}
.rst{margin-left:6px;padding:5px 10px;border-radius:20px;border:.5px solid var(--brd2);background:transparent;color:var(--txt2);font-size:12px;font-family:inherit;cursor:pointer}
.stp{flex-shrink:0;display:flex;background:var(--bg2);border-bottom:.5px solid var(--brd)}
.sb{flex:1;padding:9px 2px;font-size:11px;border:none;background:transparent;color:var(--txt3);cursor:pointer;font-family:inherit;text-align:center;line-height:1.3;transition:all .2s;position:relative}
.sb.on{color:var(--pu);font-weight:700}
.sb.on::after{content:"";position:absolute;bottom:0;left:10%;right:10%;height:2px;background:var(--pu);border-radius:2px}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(14px + var(--sb))}
.pnl{display:none}.pnl.on{display:block}
.sl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--pu);margin:16px 0 8px}
.sl:first-child{margin-top:0}
.f{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.f label{font-size:12px;color:var(--txt2);font-weight:600}
.f input,.f select,.f textarea{padding:10px 12px;border:.5px solid var(--brd);border-radius:var(--r);background:var(--bg2);color:var(--txt);font-size:14px;font-family:inherit;outline:none;width:100%;-webkit-appearance:none}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--pu);box-shadow:0 0 0 3px var(--pu2)}
.f textarea{resize:vertical;min-height:52px;line-height:1.5}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tsel{position:relative;margin-bottom:6px}
.tsel select{width:100%;padding:12px 38px 12px 14px;font-size:14px;font-weight:600;border-radius:var(--rl);background:var(--bg2);border:.5px solid var(--brd);color:var(--txt);-webkit-appearance:none}
.tsel::after{content:"▾";position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--txt2);pointer-events:none}
.ztgls{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.ztgl{display:flex;align-items:center;gap:7px;padding:8px 10px;border:.5px solid var(--brd);border-radius:var(--r);cursor:pointer;user-select:none;background:var(--bg2);transition:all .15s}
.ztgl.on{background:var(--pu2);border-color:var(--pu3)}
.ztgl input{accent-color:var(--pu);width:16px;height:16px;flex-shrink:0}
.ztgl .zl{font-size:12px;line-height:1.3;color:var(--txt)}
.zone{background:var(--bg);border:.5px solid var(--brd);border-radius:var(--rl);margin-bottom:9px;overflow:hidden}
.zone.active{border-color:var(--pu)}
.zh{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.ztog{width:26px;height:26px;border-radius:50%;border:.5px solid var(--brd2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--txt2);background:var(--bg2);flex-shrink:0;font-weight:700;transition:all .15s}
.zone.active .ztog{background:var(--pu);color:#1a1020;border-color:var(--pu)}
.zn{font-size:14px;font-weight:700;flex:1;color:var(--txt)}
.zb{font-size:11px;padding:3px 9px;border-radius:10px;background:var(--bg2);border:.5px solid var(--brd);color:var(--txt2);white-space:nowrap;flex-shrink:0}
.zb.ok{background:var(--pu2);border-color:var(--pu3);color:var(--pu);font-weight:700}
.zbody{display:none;padding:0 14px 14px;border-top:.5px solid var(--brd)}
.zone.active .zbody{display:block}
.fxt{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;margin:12px 0 8px;display:flex;align-items:center;gap:6px}
.fxt span{font-size:9px;background:var(--pu2);color:var(--pu);padding:2px 8px;border-radius:8px;font-weight:700}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fc{background:var(--bg2);border-radius:var(--r);padding:10px 11px}
.fl{font-size:11px;color:var(--txt2);margin-bottom:2px;line-height:1.3;font-weight:600}
.ft{font-size:10px;color:var(--pu);margin-bottom:6px;font-weight:600;min-height:14px}
.cr{display:flex;align-items:center;gap:5px}
.cb{width:36px;height:36px;border-radius:8px;border:.5px solid var(--brd2);background:var(--bg);color:var(--txt);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:background .1s;flex-shrink:0;line-height:1;font-weight:300}
.cb:active{background:var(--pu2)}
.ci{width:52px;height:36px;border-radius:8px;border:.5px solid var(--brd);background:var(--bg);color:var(--txt);font-size:18px;font-weight:700;text-align:center;font-family:inherit;outline:none;-webkit-appearance:none}
.ci:focus{border-color:var(--pu)}
.yn-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:.5px solid var(--brd)}
.yn-lbl{font-size:13px;color:var(--txt);font-weight:500}
.yn-btns{display:flex;gap:4px}
.yn-btn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;border:.5px solid var(--brd2);background:var(--bg2);color:var(--txt2);cursor:pointer;font-family:inherit;transition:all .15s}
.yn-btn.yes.on{background:#22c55e;color:#fff;border-color:#22c55e}
.yn-btn.no.on{background:var(--bg3);color:var(--txt2)}
.floor-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:.5px solid var(--brd)}
.floor-row label{font-size:12px;color:var(--txt2);flex:1;font-weight:600}
.floor-sel{padding:6px 10px;border:.5px solid var(--brd);border-radius:var(--r);background:var(--bg2);color:var(--txt);font-size:12px;font-family:inherit;outline:none;-webkit-appearance:none;flex:1}
.floor-sel:focus{border-color:var(--pu)}
.floor-mult{font-size:11px;font-weight:700;color:var(--pu);min-width:36px;text-align:right}
.sub-sec{background:var(--bg2);border:.5px solid var(--brd);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
.sub-ti{font-size:12px;font-weight:700;color:var(--pu);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.add-sub{padding:4px 10px;border-radius:16px;font-size:11px;font-weight:600;border:.5px solid var(--pu3);background:var(--pu2);color:var(--pu);cursor:pointer;font-family:inherit}
.rm-sub{padding:3px 8px;border-radius:12px;font-size:11px;border:.5px solid var(--brd2);background:transparent;color:var(--txt3);cursor:pointer;font-family:inherit}
.tst{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 8px}
.tr{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:.5px solid var(--brd)}
.tr:last-child{border-bottom:none}
.tc{width:20px;height:20px;accent-color:var(--pu);cursor:pointer;flex-shrink:0;margin-top:2px}
.tm{flex:1;min-width:0}
.tt{font-size:13px;line-height:1.4;color:var(--txt)}
.tmeta{display:flex;align-items:center;gap:6px;margin-top:4px}
.fqs{padding:2px 6px;border-radius:8px;border:.5px solid var(--brd);background:var(--bg2);color:var(--txt);font-size:11px;font-family:inherit;outline:none;cursor:pointer;-webkit-appearance:none}
.fq-h{background:rgba(74,222,128,0.12);color:#15803d}
.fq-m{background:rgba(251,191,36,0.12);color:#b45309}
.fq-l{background:rgba(148,163,184,0.15);color:var(--txt3)}
.nf{width:100%;padding:9px 11px;border:.5px solid var(--brd);border-radius:var(--r);background:var(--bg2);color:var(--txt);font-size:13px;font-family:inherit;resize:vertical;min-height:46px;margin-top:12px;outline:none;line-height:1.5}
.nf:focus{border-color:var(--pu)}
.pi2r{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:.5px solid var(--brd)}
.pi2r label{font-size:12px;color:var(--txt2);flex:1;font-weight:600}
.pi2r input{width:110px;padding:7px 10px;border:.5px solid var(--brd);border-radius:var(--r);background:var(--bg2);color:var(--txt);font-size:14px;font-family:inherit;outline:none;text-align:right}
.sum-bar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.smc{background:var(--bg2);border-radius:var(--r);padding:11px 13px}
.smc .l{font-size:10px;color:var(--txt2);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.smc .v{font-size:20px;font-weight:700;color:var(--txt)}
.smc .v.ac{color:var(--pu)}
.rz{background:var(--bg2);border-radius:var(--rl);padding:11px 14px;margin-bottom:8px}
.rzh{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.rzn{font-size:13px;font-weight:700;color:var(--txt)}
.rzt{font-size:13px;font-weight:700;color:var(--pu)}
.rzd{font-size:11px;color:var(--txt2);line-height:1.7}
.btn{padding:13px 18px;border-radius:var(--r);font-size:14px;font-family:inherit;cursor:pointer;border:.5px solid var(--brd2);background:transparent;color:var(--txt);transition:all .15s;font-weight:600}
.btn:active{opacity:.7}
.btn.p{background:var(--pu);color:#1a1020;border-color:var(--pu)}
.btn.full{width:100%;display:block;text-align:center;margin-bottom:10px}
.u{font-size:11px;color:var(--txt3)}
.apx-box{background:var(--pu2);border:.5px solid var(--pu3);border-radius:var(--rl);padding:14px;margin-bottom:14px}
.apx-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:.5px solid var(--pu3)}
.apx-row:last-child{border-bottom:none}
.apx-l{font-size:13px;color:var(--txt);font-weight:600}
.apx-v{font-size:13px;font-weight:700;color:var(--pu)}
.seg-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.seg-btn{padding:10px 8px;border-radius:var(--r);border:.5px solid var(--brd);background:var(--bg2);color:var(--txt2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.seg-btn.on{background:var(--pu2);border-color:var(--pu3);color:var(--pu)}
.freq-row{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:6px}
.freq-btn{padding:9px 4px;border-radius:var(--r);border:.5px solid var(--brd);background:var(--bg2);color:var(--txt2);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;text-align:center}
.freq-btn.on{background:var(--pu);border-color:var(--pu);color:#1a1020}
.qcard{background:var(--bg2);border:.5px solid var(--brd);border-radius:var(--rl);padding:12px 13px;margin-bottom:10px}
.qcard-hd{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:10px}
.zone-add-btn{width:100%;padding:15px;border-radius:var(--rl);border:1.5px dashed var(--pu3);background:var(--pu2);color:var(--pu);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;transition:all .15s;margin-top:8px}
.zone-add-btn:active{opacity:.7}
.zone-add-plus{font-size:22px;font-weight:300;line-height:1}
#zone-add-area{margin-top:4px}
.zone-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px 24px;text-align:center;color:var(--txt3)}
.zone-empty-icon{font-size:44px;margin-bottom:12px;opacity:.5}
.zone-empty-txt{font-size:14px;font-weight:600;color:var(--txt2);margin-bottom:4px}
.zone-empty-sub{font-size:12px;color:var(--txt3);line-height:1.5}
</style>
</head>

var activeZones={sdb:true,bouv:true,bferm:true,corr:true,caf:true,rec:true,hall:true};
var ST={};

function initST(){
  ST={};
  for(var zi=0;zi<ZONES.length;zi++){
    var z=ZONES[zi];
    var s={open:false,counts:{},yn:{},taches:{},tacheFreqs:{},note:"",pi2:"",floor:"Linoléum",plancher_min:0,
      cafSubs:[{evier:0,frigo:0,micro:0,cafe:0,table:0,poubelle:0,plancher_min:0}],
      confSubs:[{nom:"Standard",nb:0,tables:0,chaises:0,poubelles:0,plancher_min:0}],
      hallSubs:[{vestibules:0,fenetres:0,minFen:0.5,plancher_min:0}]};
    if(z.special==="bferm")s.counts={nb_bureaux:0,nb_poubelles_bferm:0};
    else if(z.special==="bouv")s.counts={nb_bureaux_ouv:0,nb_poubelles_bouv:0};
    else if(z.fixes)for(var fi=0;fi<z.fixes.length;fi++)s.counts[z.fixes[fi].key]=0;
    if(z.taches)for(var ti=0;ti<z.taches.length;ti++){s.taches[ti]=true;s.tacheFreqs[ti]=z.taches[ti].f;}
    ST[z.id]=s;
  }
}
initST();
function gst(zid){return ST[zid];}
function hasZone(id){return !!activeZones[id];}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmtM(m){var h=Math.floor(m/60),mn=Math.round(m%60);return h>0?h+"h"+("0"+mn).slice(-2):mn+"min";}
function floorMult(zid){return FLOOR_MULT[ST[zid].floor]||1.0;}

function zTime(z){
  var st=gst(z.id),fm=floorMult(z.id),t=0;
  if(z.special==="bferm"){t+=(st.counts.nb_bureaux||0)*getI("bureau_full")*fm;if(st.yn.poubelles){var p=(st.counts.nb_poubelles_bferm>0)?st.counts.nb_poubelles_bferm:(st.counts.nb_bureaux||0);t+=p*getI("poubelle_sm");}}
  else if(z.special==="bouv"){t+=(st.counts.nb_bureaux_ouv||0)*getI("bureau_full")*fm;if(st.yn.poubelles){var p=(st.counts.nb_poubelles_bouv>0)?st.counts.nb_poubelles_bouv:(st.counts.nb_bureaux_ouv||0);t+=p*getI("poubelle_sm");}}
  else if(z.special==="conf"){for(var i=0;i<st.confSubs.length;i++){var c=st.confSubs[i];t+=(c.nb||0)*(c.chaises||0)*getI("bureau_spot")+(c.nb||0)*(c.poubelles||0)*getI("poubelle_sm")+(c.plancher_min||0);}}
  else if(z.special==="caf"){for(var i=0;i<st.cafSubs.length;i++){var c=st.cafSubs[i];t+=(c.evier||0)*getI("toilette")+(c.frigo||0)*getI("frigo_ext")+(c.micro||0)*getI("micro_ext")+(c.cafe||0)*getI("coin_cafe")+(c.table||0)*getI("surface_25")*fm+(c.poubelle||0)*getI("poubelle_lg")+(c.plancher_min||0);}}
  else if(z.special==="hall"){for(var i=0;i<st.hallSubs.length;i++){var h=st.hallSubs[i];t+=(h.fenetres||0)*(h.minFen||0.5)+(h.plancher_min||0);}}
  else if(z.fixes){for(var i=0;i<z.fixes.length;i++){var f=z.fixes[i];if(f.issa)t+=(st.counts[f.key]||0)*getI(f.issa);}}
  if(z.pi2&&st.pi2)t+=parseFloat(st.pi2)*60/5400*fm;
  t+=(st.plancher_min||0);
  return t;
}
function zFix(z){
  var st=gst(z.id);
  if(z.special==="bferm")return st.counts.nb_bureaux||0;
  if(z.special==="bouv")return st.counts.nb_bureaux_ouv||0;
  if(z.special==="conf"){var n=0;for(var i=0;i<st.confSubs.length;i++){var c=st.confSubs[i];n+=(c.nb||0)*((c.chaises||0)+(c.poubelles||0));}return n;}
  if(z.special==="caf"){var n=0;for(var i=0;i<st.cafSubs.length;i++){var c=st.cafSubs[i];n+=(c.evier||0)+(c.frigo||0)+(c.micro||0)+(c.cafe||0)+(c.table||0)+(c.poubelle||0);}return n;}
  if(z.special==="hall")return 0;
  if(z.fixes){var n=0;for(var i=0;i<z.fixes.length;i++)if(z.fixes[i].issa)n+=st.counts[z.fixes[i].key]||0;return n;}
  return 0;
}
function totalTime(){var t=0;for(var i=0;i<ZONES.length;i++)if(hasZone(ZONES[i].id))t+=zTime(ZONES[i]);return t;}
function totalFix(){var n=0;for(var i=0;i<ZONES.length;i++)if(hasZone(ZONES[i].id))n+=zFix(ZONES[i]);return n;}

  var body="";

  if(z.special==="bferm"){

  } else if(z.special==="bouv"){
    body+='<div class="fxt">Compteurs <span>Temps ISSA auto</span></div><div class="fg"><div class="fc"><div class="fl">Nb de postes ouverts</div><div class="ft">'+getI("bureau_full")+' min/poste × x'+fm.toFixed(2)+'</div>'+counterHTML(z.id,"nb_bureaux_ouv",st.counts.nb_bureaux_ouv)+'</div></div><div style="margin-top:10px"><div class="yn-row"><span class="yn-lbl">Vider les poubelles? (1/poste)</span><div class="yn-btns"><button class="yn-btn yes'+(st.yn.poubelles?" on":"")+'\" onclick="setYN(\''+z.id+'\',\'poubelles\',true)">Oui</button><button class="yn-btn no'+(!st.yn.poubelles?" on":"")+'\" onclick="setYN(\''+z.id+'\',\'poubelles\',false)">Non</button></div></div>'+(st.yn.poubelles?'<div style="margin-top:8px"><div class="fl" style="margin-bottom:4px">Nombre de poubelles</div>'+counterHTML(z.id,"nb_poubelles_bouv",st.counts.nb_poubelles_bouv)+'<div style="font-size:10px;color:var(--txt3);margin-top:3px">0 = auto (1 par poste)</div></div>':"")+'</div>';
  } else if(z.special==="conf"){
    var totalSalles=0;for(var i=0;i<st.confSubs.length;i++)totalSalles+=st.confSubs[i].nb||0;
    body+='<div class="fxt">Salles de conférence <span>Temps ISSA auto</span></div><div style="background:var(--bg2);border-radius:var(--r);padding:10px 12px;margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:var(--txt)">Total : <span style="color:var(--pu)">'+totalSalles+' salle'+(totalSalles!==1?"s":"")+'</span> <span style="font-size:11px;color:var(--txt3);font-weight:400">en '+st.confSubs.length+' catégorie'+(st.confSubs.length!==1?"s":"")+'</span></div><div style="font-size:11px;color:var(--txt3)">Ex: 10 salles Standard + 1 Grande salle</div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="fxt" style="margin:0">Catégories <span>fixtures × nb de salles</span></div>'+(st.confSubs.length<6?'<button class="add-sub" onclick="addConf(\''+z.id+'\')">+ Catégorie</button>':"")+'</div>';

function buildZones(){
  var c=document.getElementById("zones-container"),active=[];
  for(var i=0;i<ZONES.length;i++)if(hasZone(ZONES[i].id))active.push(ZONES[i]);
  if(!active.length){
    c.innerHTML='<div class="zone-empty"><div class="zone-empty-icon">🗂️</div><div class="zone-empty-txt">Aucune section ajoutée</div><div class="zone-empty-sub">Appuyez sur <strong>＋ Ajouter une section</strong><br>pour commencer votre relevé</div></div>';
  } else {
    var html="";for(var i=0;i<active.length;i++)html+=buildZoneHTML(active[i]);c.innerHTML=html;
  }
  buildZonePicker();
}

function buildZonePicker(){
  var html="";
  for(var i=0;i<ZONES.length;i++){
    var z=ZONES[i],on=hasZone(z.id);
    if(on)continue;
    html+='<button onclick="addZoneFromPicker(\''+z.id+'\')" style="display:flex;align-items:center;gap:6px;padding:8px 10px;border:.5px solid var(--brd);border-radius:var(--r);cursor:pointer;background:var(--bg);color:var(--txt);font-size:12px;font-weight:600;text-align:left;width:100%"><span>'+z.icon+'</span><span>'+z.name+'</span></button>';
  }
  var list=document.getElementById("zone-picker-list");
  if(list){list.innerHTML=html||'<div style="grid-column:1/-1;font-size:12px;color:var(--txt2);padding:4px 0">Toutes les zones sont ajoutées.</div>';}
}

function removeZone(e,id){e.preventDefault();e.stopPropagation();delete activeZones[id];buildZones();}

function addZoneFromPicker(id){
  activeZones[id]=true;
  document.getElementById("zone-picker").style.display="none";
  var btn=document.getElementById("btn-add-zone");
  btn.innerHTML='<span class="zone-add-plus">＋</span> Ajouter une section';
  btn.style.borderStyle='dashed';
  buildZones();
}

function toggleZonePicker(){
  var p=document.getElementById("zone-picker");
  var open=p.style.display==="none";
  p.style.display=open?"block":"none";
  var btn=document.getElementById("btn-add-zone");
  if(open){btn.innerHTML='<span class="zone-add-plus">✕</span> Fermer';btn.style.borderStyle='solid';}
  else{btn.innerHTML='<span class="zone-add-plus">＋</span> Ajouter une section';btn.style.borderStyle='dashed';}
  if(open)buildZonePicker();
}

  html+='<div class="sl">Détail par zone</div>';
  var hasData=false;
  for(var i=0;i<ZONES.length;i++){
    var z=ZONES[i];if(!hasZone(z.id))continue;
    var zm=zTime(z),zf=zFix(z),st=gst(z.id);

    hasData=true;
    var details=[];

    else if(z.special==="bouv"){details.push((st.counts.nb_bureaux_ouv||0)+" postes");if(st.yn.poubelles)details.push("Poubelles ✓");}
    else if(z.special==="conf"){var tot=0;for(var ci=0;ci<st.confSubs.length;ci++)tot+=st.confSubs[ci].nb||0;if(tot>0){details.push("Total: "+tot+" salle"+(tot>1?"s":""));for(var ci=0;ci<st.confSubs.length;ci++){var c=st.confSubs[ci];if((c.nb||0)>0)details.push((c.nom||"Cat."+(ci+1))+": "+(c.nb||0));}}}
    else if(z.special==="caf"){for(var ci=0;ci<st.cafSubs.length;ci++){var c=st.cafSubs[ci];var tot=(c.evier||0)+(c.frigo||0)+(c.micro||0)+(c.cafe||0)+(c.table||0)+(c.poubelle||0);if(tot>0)details.push("Caf."+(ci+1)+": "+tot+" fix.");}}
    else if(z.special==="hall"){for(var ci=0;ci<st.hallSubs.length;ci++){var h=st.hallSubs[ci];details.push("Entr."+(ci+1)+": "+(h.vestibules||0)+" vest., "+(h.fenetres||0)+" fen.");}}
    else if(z.fixes){for(var fi=0;fi<z.fixes.length;fi++){var f=z.fixes[fi];if((st.counts[f.key]||0)>0)details.push(f.label+": "+st.counts[f.key]);}}
    if(st.floor&&st.floor!=="Linoléum")details.push("Plancher: "+st.floor);
    if(st.note)details.push("📝 "+st.note);
    html+='<div class="rz"><div class="rzh"><div class="rzn">'+z.icon+' '+z.name+'</div><div class="rzt">'+fmtM(zm)+' · '+zf+' fix.</div></div>'+(details.length?'<div class="rzd">'+details.join("<br>")+'</div>':"")+'</div>';

function addHall(zid){gst(zid).hallSubs.push({vestibules:0,fenetres:0,minFen:0.5,plancher_min:0});buildZones();}
function rmHall(zid,hi){gst(zid).hallSubs.splice(hi,1);buildZones();}
function setYN(zid,key,val){gst(zid).yn[key]=val;buildZones();}
function refreshB(zid){
  var z=null;for(var i=0;i<ZONES.length;i++)if(ZONES[i].id===zid){z=ZONES[i];break;}
  if(!z)return;
  var tf=zFix(z),tm=zTime(z),st=gst(zid);
  var hm=tf>0||(z.pi2&&st.pi2)||(z.special==="bferm"&&(st.counts.nb_bureaux||0)>0)||(z.special==="bouv"&&(st.counts.nb_bureaux_ouv||0)>0);
  var b=document.getElementById("badge-"+zid);
  if(b){b.textContent=hm?tf+" fix · "+fmtM(tm):"Vide";b.className="zb"+(hm?" ok":"");}
}
function toggleZone(id){gst(id).open=!gst(id).open;buildZones();}

var curStep=0;
function goStep(n){curStep=n;document.querySelectorAll(".pnl").forEach(function(p,i){p.classList.toggle("on",i===n);});document.querySelectorAll(".sb").forEach(function(b,i){b.classList.toggle("on",i===n);});document.getElementById("scr").scrollTop=0;if(n===1)buildZones();if(n===2)buildResume();}

function setSeg(group,val,btn){
  document.getElementById('i-'+group).value=val;
  btn.closest('.seg-row').querySelectorAll('.seg-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  saveAll();
}

function setFreq(val,btn){
  document.getElementById('i-freq').value=val;
  document.getElementById('freq-seg').querySelectorAll('.freq-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  saveAll();
}

function updateQuartCards(){
  var n=parseInt(document.getElementById('i-quarts').value)||1;
  document.getElementById('qcard-jour').style.display='block';
  document.getElementById('qcard-soir').style.display=n>=2?'block':'none';
  document.getElementById('qcard-nuit').style.display=n>=3?'block':'none';
  saveAll();
}

document.addEventListener('DOMContentLoaded',function(){
  var qEl=document.getElementById('i-quarts');
  if(qEl)qEl.addEventListener('input',updateQuartCards);
});

var STORE_KEY="solea-calcul-v2";
function saveField(k,v){try{var d=JSON.parse(localStorage.getItem(STORE_KEY)||"{}");d[k]=v;localStorage.setItem(STORE_KEY,JSON.stringify(d));}catch(e){}}
function loadField(k){try{var d=JSON.parse(localStorage.getItem(STORE_KEY)||"{}");return d[k]||"";}catch(e){return "";}}
function saveAll(){
  var d={};
  ["i-nom","i-contact","i-tel","i-adresse","i-ville","i-date","i-email","i-notes","i-sup","i-etages","type-select",
   "i-menager","i-irritants","i-freq","i-quarts",
   "i-jour-debut","i-jour-fin","i-jour-emp","i-jour-notes",
   "i-soir-debut","i-soir-fin","i-soir-emp","i-soir-notes",
   "i-nuit-debut","i-nuit-fin","i-nuit-emp","i-nuit-notes"
  ].forEach(function(id){var el=document.getElementById(id);if(el)d[id]=el.value;});
  d.activeZones=activeZones;d.ST=ST;d.note_resume=loadField("note_resume");
  try{localStorage.setItem(STORE_KEY,JSON.stringify(d));}catch(e){}
}
function loadAll(){
  try{
    var d=JSON.parse(localStorage.getItem(STORE_KEY)||"{}");
    ["i-nom","i-contact","i-tel","i-adresse","i-ville","i-date","i-email","i-notes","i-sup","i-etages","type-select",
     "i-menager","i-irritants","i-freq","i-quarts",
     "i-jour-debut","i-jour-fin","i-jour-emp","i-jour-notes",
     "i-soir-debut","i-soir-fin","i-soir-emp","i-soir-notes",
     "i-nuit-debut","i-nuit-fin","i-nuit-emp","i-nuit-notes"
    ].forEach(function(id){var el=document.getElementById(id);if(el&&d[id]!==undefined)el.value=d[id];});
    if(d.activeZones)activeZones=d.activeZones;
    if(d.ST){for(var zid in d.ST){if(ST[zid]!==undefined){var sv=d.ST[zid];["open","counts","yn","taches","tacheFreqs","note","pi2","floor","plancher_min","cafSubs","confSubs","hallSubs"].forEach(function(k){if(sv[k]!==undefined)ST[zid][k]=sv[k];});}}}
    // Restore seg/freq UI state
    var men=document.getElementById('i-menager');
    if(men&&men.value){var mSeg=document.getElementById('menager-seg');if(mSeg){mSeg.querySelectorAll('.seg-btn').forEach(function(b){b.classList.toggle('on',b.getAttribute('onclick').indexOf("'"+men.value+"'")>-1);});}}
    var frq=document.getElementById('i-freq');
    if(frq&&frq.value){var fSeg=document.getElementById('freq-seg');if(fSeg){fSeg.querySelectorAll('.freq-btn').forEach(function(b){b.classList.toggle('on',b.getAttribute('onclick').indexOf('('+frq.value+',')>-1);});}}
    updateQuartCards();
  }catch(e){}
}
function resetAll(){
  localStorage.removeItem(STORE_KEY);
  ["i-nom","i-contact","i-tel","i-adresse","i-ville","i-email","i-notes","i-sup",
   "i-irritants","i-jour-emp","i-jour-notes","i-soir-emp","i-soir-notes","i-nuit-emp","i-nuit-notes"
  ].forEach(function(id){var el=document.getElementById(id);if(el)el.value="";});
  document.getElementById("i-etages").value="1";
  document.getElementById("type-select").value="bureau";
  document.getElementById("i-menager").value="interne";
  document.getElementById("i-freq").value="3";
  document.getElementById("i-quarts").value="1";
  document.getElementById("i-jour-debut").value="07:00";
  document.getElementById("i-jour-fin").value="15:00";
  document.getElementById("i-soir-debut").value="15:00";
  document.getElementById("i-soir-fin").value="23:00";
  document.getElementById("i-nuit-debut").value="23:00";
  document.getElementById("i-nuit-fin").value="07:00";
  var mSeg=document.getElementById('menager-seg');if(mSeg){mSeg.querySelectorAll('.seg-btn').forEach(function(b,i){b.classList.toggle('on',i===0);});}
  var fSeg=document.getElementById('freq-seg');if(fSeg){fSeg.querySelectorAll('.freq-btn').forEach(function(b,i){b.classList.toggle('on',i===2);});}
  activeZones={};initST();updateQuartCards();goStep(0);
}

document.addEventListener("input",function(){saveAll();});
document.addEventListener("change",function(){saveAll();});

(function init(){
  loadAll();
  var dateEl=document.getElementById("i-date");if(!dateEl.value)dateEl.value=new Date().toISOString().split("T")[0];
  if(navigator.serviceWorker)navigator.serviceWorker.register("sw.js").catch(function(){});
  var isIos=/iphone|ipad|ipod/i.test(navigator.userAgent);
  if(isIos&&!window.navigator.standalone){var b=document.getElementById("install-hint");b.innerHTML='<div style="background:var(--pu2);border:.5px solid var(--pu3);border-radius:var(--rl);padding:11px 13px;margin-bottom:14px;font-size:13px;line-height:1.6;color:var(--txt)">📱 <strong>Installer l\'app</strong> — Safari → partage → <strong>"Sur l\'écran d\'accueil"</strong><button style="float:right;border:none;background:transparent;color:var(--txt3);font-size:16px;cursor:pointer" onclick="this.parentNode.remove()">×</button></div>';}
})();
</script>
